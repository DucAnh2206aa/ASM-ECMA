<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Form sản phẩm</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-2xl mx-auto p-6 bg-white mt-10 rounded-xl shadow">

    <button type="button" onclick="goBack()" 
        class="mb-4 bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
        ← Quay lại
    </button>

    <h1 id="title" class="text-2xl font-bold mb-6">➕ Thêm sản phẩm</h1>

    <form id="product-form" class="space-y-4">

      <input id="name" type="text" placeholder="Tên sản phẩm"
        class="w-full border p-3 rounded" />

      <input id="category" type="text" placeholder="Danh mục"
        class="w-full border p-3 rounded" />

      <input id="price" type="number" placeholder="Giá"
        class="w-full border p-3 rounded" />

      <input id="image" type="text" placeholder="Link ảnh"
        class="w-full border p-3 rounded" />

      <textarea id="description" placeholder="Mô tả"
        class="w-full border p-3 rounded"></textarea>

      <button 
        class="bg-emerald-600 text-white px-6 py-3 rounded w-full">
        💾 Lưu
      </button>

    </form>

  </div>

  <script src="form.js"></script>
</body>
</html>
