<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Admin - Quản lý sản phẩm</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <div class="max-w-7xl mx-auto p-6">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">📦 Quản lý sản phẩm</h1>
      
      <a href="form.html" 
        class="bg-emerald-600 text-white px-4 py-2 rounded">
        ➕ Thêm sản phẩm
      </a>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-10 hidden">
      ⏳ Đang tải...
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-3 text-left">ID</th>
            <th class="p-3 text-left">Ảnh</th>
            <th class="p-3 text-left">Tên</th>
            <th class="p-3 text-left">Giá</th>
            <th class="p-3 text-left">Hành động</th>
          </tr>
        </thead>
        <tbody id="product-table"></tbody>
      </table>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
