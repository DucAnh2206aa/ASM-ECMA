<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Quản lý Sản phẩm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-8 text-center">🛠️ Admin - Quản lý Sản phẩm</h1>
    
    <!-- Form -->
    <div id="form-section" class="bg-white p-6 rounded-xl shadow mb-8"></div>
    
    <!-- Search -->
    <div class="mb-6">
      <input type="text" id="search-input" 
             placeholder="Tìm theo tên sản phẩm..." 
             class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:border-blue-500">
    </div>

    <!-- Table -->
    <div id="product-list" class="bg-white rounded-xl shadow overflow-hidden"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
